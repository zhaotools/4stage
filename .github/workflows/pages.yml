name: Update data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "37 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Restore last successful market data
        uses: actions/cache@v4
        with:
          path: .market-cache
          key: market-data-${{ github.run_id }}
          restore-keys: market-data-
      - name: Run stage regression suite
        run: node tests/stage-regression.mjs
      - name: Fetch market data and run stage analysis
        env:
          CACHE_DIR: .market-cache
        run: node backend/update.mjs
      - name: Assemble browser-only frontend
        run: |
          mkdir _site
          cp index.html styles.css app.js favicon.svg manifest.webmanifest app-icon-180.png app-icon-192.png app-icon-512.png .nojekyll README.md _site/
          cp -R data _site/data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
