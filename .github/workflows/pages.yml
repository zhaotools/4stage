name: Test, update data, and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "37 1 * * 6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # The checked-in lockfile is generated on macOS; allow pnpm to normalize
      # platform-specific optional dependencies in the ephemeral Linux runner.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
      - name: Generate live market data
        env:
          DATA_PROVIDER: eastmoney
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          INCLUDE_HS300: true
          DATA_ONLY: ${{ github.event_name == 'push' && 'overseas' || '' }}
        run: pnpm data:update
      - name: Export generated market data
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: generated-market-data
          path: public/data
          retention-days: 3
      - name: Validate model stability
        run: pnpm model:validate
      - run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
